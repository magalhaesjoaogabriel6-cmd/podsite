<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podsite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2>Nomecast</h2>
        <img alt="logo">
    </nav>
    <header>
        <h1>NOMECAST</h1>
    </header>
    <main>
        <section class="present">
            <figure class="joao">
                <img alt="João">
                <figcaption>
                    <h4>Joao</h4>
                    <h4>2°B</h4>
                    <p>joao blablabla</p>
                </figcaption>
            </figure>
            <figure class="miguel">
                <img alt="Miguel">
                <figcaption>
                    <h4>Miguel</h4>
                    <h4>2°B</h4>
                    <p>miguel blablabla</p>
                </figcaption>
            </figure>
            <figure class="ryan">
                <img alt="Ryan">
                <figcaption>
                    <h4>Ryan</h4>
                    <h4>2°B</h4>
                    <p>ryan blablabla</p>
                </figcaption>
            </figure>
        </section>
        <section class="podcast">
            <h3>Podcast sobre música</h3>
            <h4>explicação</h4>

            <div class="audio">
                <button></button>
                <div class="linha"></div>
                <div class="bola"></div>
                <h6>*tempo*</h6>
            </div>
            <div class="transcricao">
                <h3>Transcrição:</h3>
                <h2>Joao: good evening to our listeners!</h2><br>
            </div>
        </section>
    </main>
    <p>Obrigado por assistir!</p>
</body>
</html>
